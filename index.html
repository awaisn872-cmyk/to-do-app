<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>📝 Todo App</h1>

        <div class="input-area">

            <input
                type="text"
                id="todo-input"
                placeholder="Enter your task..."
                onkeydown="if(event.key==='Enter') addTodo()">

            <input
                type="date"
                id="todo-date">

            <button class="add-btn" onclick="addTodo()">
                Add
            </button>

        </div>

        <div class="todo-container" id="todo-container">

            <!-- Todos will appear here -->

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
